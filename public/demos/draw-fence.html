<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>04 Draw Fence</title>
    <link rel="stylesheet" href="https://esm.sh/ol/ol.css" />
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
      }

      #map {
        width: 100%;
        height: 100%;
      }

      #controls {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        position: fixed;
        top: 0.75rem;
        left: 3rem;
        z-index: 1;
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid #ddd;
        border-radius: 0.25rem;
        padding: 0.5rem 0.75rem;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }

      #post-distance {
        width: 4.5rem;
      }

      .ol-tooltip {
        position: relative;
        background: rgba(0, 0, 0, 0.75);
        border-radius: 4px;
        color: #fff;
        padding: 4px 8px;
        white-space: nowrap;
        font-size: 12px;
        user-select: none;
      }

      .ol-tooltip::before {
        border-top: 6px solid rgba(0, 0, 0, 0.75);
        border-right: 6px solid transparent;
        border-left: 6px solid transparent;
        content: '';
        position: absolute;
        bottom: -5px;
        left: 50%;
        margin-left: -6px;
      }

      .ol-tooltip-static {
        background: SaddleBrown;
      }

      .ol-tooltip-static::before {
        border-top-color: SaddleBrown;
      }
      
      .ol-tooltip-done {
        border: 2px solid white;
      }
    </style>
  </head>
  <body>
    <div id="info">
      <div id="controls">
        <label for="post-distance">Post distance (m)</label>
        <input id="post-distance" type="number" min="1" step="0.1" value="10.0" />
      </div>
    </div>
    <div id="map"></div>
    <script type="module">
      import Map from "https://esm.sh/ol/Map.js";
      import View from "https://esm.sh/ol/View.js";
      import TileLayer from "https://esm.sh/ol/layer/Tile.js";
      import VectorLayer from "https://esm.sh/ol/layer/Vector.js";
      import OSM from "https://esm.sh/ol/source/OSM.js";
      import VectorSource from "https://esm.sh/ol/source/Vector.js";
      import Draw from "https://esm.sh/ol/interaction/Draw.js";
      import Overlay from "https://esm.sh/ol/Overlay.js";
      import Point from "https://esm.sh/ol/geom/Point.js";
      import LineString from "https://esm.sh/ol/geom/LineString.js";
      import { getLength } from "https://esm.sh/ol/sphere.js";
      import { unByKey } from "https://esm.sh/ol/Observable.js";
      import Style from "https://esm.sh/ol/style/Style.js";
      import Stroke from "https://esm.sh/ol/style/Stroke.js";
      import Fill from "https://esm.sh/ol/style/Fill.js";
      import CircleStyle from "https://esm.sh/ol/style/Circle.js";
      import { fromLonLat } from "https://esm.sh/ol/proj.js";


      let postDistance = 10;

      const postDistanceInput = document.getElementById("post-distance");
      const lineSource = new VectorSource();

      const fenceLineStyle = new Style({
        stroke: new Stroke({
          color: "SaddleBrown",
          width: 3,
        }),
      });

      const fencePostStyle = new Style({
        image: new CircleStyle({
          radius: 5,
          fill: new Fill({
            color: "white",
          }),
          stroke: new Stroke({
            color: "SaddleBrown",
            width: 2,
          }),
        }),
      });

      const fenceStyleFunction = (feature) => {
        const geometry = feature.getGeometry();
        if (geometry instanceof Point) {
          // this is the point where the cursor is currently hovering. Display it as a post.
          return fencePostStyle;
        }

        return [
          fenceLineStyle,
          ...getPostCoordinates(geometry).map((coordinate) => {
            return new Style({
              geometry: new Point(coordinate),
              image: fencePostStyle.getImage(),
            });
          }),
        ];
      };

      const lineLayer = new VectorLayer({
        source: lineSource,
        style: fenceStyleFunction, // this is the style after the drawing is finished
      });

      // center the map on the AGIT 2026 location
      const nawiTeichAgit = fromLonLat([13.059252, 47.788145]);

      const map = new Map({
        target: "map",
        layers: [
          new TileLayer({
            source: new OSM(),
          }),
          lineLayer,
        ],
        view: new View({
          zoom: 19,
          center: nawiTeichAgit,
          minZoom: 17,
        }),
      });

      // change-listener for geometry changes while drawing. This is used to update the tooltip with the current length of the line.
      let listener;


      const getPostCoordinates = (line) => {
        const totalLength = getLength(line);
        if (totalLength === 0) {
          return [];
        }

        const coordinates = [];
        for (let distance = 0; distance <= totalLength; distance += postDistance) {
          coordinates.push(line.getCoordinateAt(distance / totalLength));
        }

        const lastDistance = Math.floor(totalLength / postDistance) * postDistance;
        if (lastDistance < totalLength) {
          coordinates.push(line.getLastCoordinate());
        }
        return coordinates;
      };

      const formatPostCount = (line) => {
        const length = getLength(line);
        return `${1 + Math.ceil(length / postDistance)} posts`;
      };


      const measureTooltipElement = document.createElement("div");

      const measureTooltip = new Overlay({
        element: measureTooltipElement,
        offset: [0, -15],
        positioning: "bottom-center",
        stopEvent: false,
        insertFirst: false,
      });
      map.addOverlay(measureTooltip);

      const draw = new Draw({
        source: lineSource,
        type: "LineString",
        style: fenceStyleFunction, // this is the style during drawing
      });

      map.addInteraction(draw);

      postDistanceInput.addEventListener("input", () => {
        postDistance = Number(postDistanceInput.value) || 1;

        lineLayer.changed();
        map.render();
      });

      draw.on("drawstart", (event) => {
        // clear any old sketch and reset the tooltip
        lineSource.clear();
        measureTooltip.setPosition(undefined);
        // reset the tooltip to the default style
        measureTooltipElement.className = "ol-tooltip ol-tooltip-static";

        // when the drawn line changes, update the tooltip with the current length
        // the "posts" are drawn automatically via the style
        listener = event.feature.getGeometry().on("change", (geomEvent) => {
          const geometry = geomEvent.target;
          if (!(geometry instanceof LineString)) {
            return;
          }

          const output = formatPostCount(geometry);
          measureTooltipElement.textContent = output;
          
          // set the tooltip to where the cursor is
          const lastCoordinate = geometry.getLastCoordinate();
          measureTooltip.setPosition(lastCoordinate);
        });
      });

      draw.on("drawend", (event) => {
        const geometry = event.feature.getGeometry();
        // give the user a minimal "feedback" that the line is done by changing the tooltip border color
        measureTooltipElement.className = "ol-tooltip ol-tooltip-static ol-tooltip-done";

        if (listener) {
          unByKey(listener);
          listener = null;
        }
      });
    </script>
  </body>
</html>
